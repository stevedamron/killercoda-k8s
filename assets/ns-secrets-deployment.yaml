# Deployment references secret "db-credentials" which does not exist.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: ns-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api
          image: nginx:1.25
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 80
