# Memory limit is 4Mi — far too low for nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-hog
  namespace: ns-resources
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memory-hog
  template:
    metadata:
      labels:
        app: memory-hog
    spec:
      containers:
        - name: app
          image: nginx:1.25
          resources:
            requests:
              cpu: 50m
              memory: 4Mi
            limits:
              cpu: 100m
              memory: 4Mi
          ports:
            - containerPort: 80
